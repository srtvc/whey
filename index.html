```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WheyValue - Protein Comparison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .best-value {
            border: 2px solid #fbbf24;
            background-color: #fffbeb;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans pb-20">
    <div class="max-w-5xl mx-auto p-4">
        <!-- Header -->
        <header class="text-center mb-8 pt-4">
            <div class="inline-block p-3 bg-indigo-600 rounded-2xl shadow-lg mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">WheyValue Pro</h1>
            <p class="text-slate-500 text-sm mt-1 font-medium text-center">Compare protein value across brands (₹)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left: Input Form -->
            <div class="lg:col-span-4">
                <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-6 space-y-4 sticky top-4">
                    <h2 class="text-lg font-bold text-slate-700 mb-2 border-b pb-2">Add New Product</h2>
                    
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Product Name (Optional)</label>
                        <input type="text" id="pName" placeholder="e.g. MuscleBlaze, MyProtein" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Price (₹)</label>
                        <input type="number" id="pPrice" placeholder="4500"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-semibold">
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Weight (g)</label>
                        <input type="number" id="pWeight" placeholder="2000"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-semibold">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Scoop Size (g)</label>
                            <input type="number" id="pScoop" placeholder="33"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-semibold">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Protein/Scoop (g)</label>
                            <input type="number" id="pProt" placeholder="24"
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-semibold">
                        </div>
                    </div>

                    <div class="flex flex-col gap-2 pt-2">
                        <button onclick="addProduct()" 
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-100 transition-all active:scale-95">
                            Add to Comparison
                        </button>
                        <div class="flex gap-2">
                            <button onclick="resetForm()" 
                                class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold py-2 rounded-lg transition-all">
                                Clear Form
                            </button>
                            <button onclick="clearStorage()" 
                                class="flex-1 bg-rose-50 hover:bg-rose-100 text-rose-600 text-xs font-bold py-2 rounded-lg transition-all">
                                Delete All Data
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Comparison Table -->
            <div class="lg:col-span-8">
                <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <h2 class="text-lg font-bold text-slate-700">Comparison Table</h2>
                        <span id="itemCount" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full font-bold">0 Items</span>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-[10px] uppercase tracking-widest text-slate-400 font-black">
                                    <th class="px-4 py-3 border-b">Product</th>
                                    <th class="px-4 py-3 border-b">Purity %</th>
                                    <th class="px-4 py-3 border-b">Cost/Scoop</th>
                                    <th class="px-4 py-3 border-b">Cost/100g Prot.</th>
                                    <th class="px-4 py-3 border-b text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="comparisonBody">
                                <!-- Data will be injected here -->
                            </tbody>
                        </table>
                    </div>
                    
                    <div id="emptyState" class="p-12 text-center text-slate-400">
                        <p class="text-sm font-medium">No products added for comparison yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl opacity-0 pointer-events-none transition-all duration-300">
        Product added!
    </div>

    <script>
        let products = [];

        // On Load: Restore from LocalStorage
        window.onload = () => {
            const savedData = localStorage.getItem('whey_comparison');
            if (savedData) {
                products = JSON.parse(savedData);
                renderTable();
            }
        };

        function addProduct() {
            const name = document.getElementById('pName').value || `Product ${products.length + 1}`;
            const price = parseFloat(document.getElementById('pPrice').value);
            const weight = parseFloat(document.getElementById('pWeight').value);
            const scoop = parseFloat(document.getElementById('pScoop').value);
            const prot = parseFloat(document.getElementById('pProt').value);

            if (!price || !weight || !scoop || !prot || prot > scoop) {
                showToast("Please check all inputs!", true);
                return;
            }

            const purity = (prot / scoop) * 100;
            const totalScoops = weight / scoop;
            const totalProtein = totalScoops * prot;
            const costPer100g = (price / totalProtein) * 100;
            const costPerScoop = price / totalScoops;

            const product = {
                id: Date.now(),
                name,
                price,
                weight,
                scoop,
                prot,
                purity,
                costPer100g,
                costPerScoop
            };

            products.push(product);
            saveAndRender();
            resetForm();
            showToast("Added to list!");
        }

        function saveAndRender() {
            localStorage.setItem('whey_comparison', JSON.stringify(products));
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('comparisonBody');
            const empty = document.getElementById('emptyState');
            const count = document.getElementById('itemCount');
            
            body.innerHTML = '';
            
            if (products.length === 0) {
                empty.classList.remove('hidden');
                count.innerText = "0 Items";
                return;
            }

            empty.classList.add('hidden');
            count.innerText = `${products.length} Items`;

            // Find best value based on cost per 100g protein
            const minCost = Math.min(...products.map(p => p.costPer100g));

            // Sort products by cost (best value first)
            const sortedProducts = [...products].sort((a, b) => a.costPer100g - b.costPer100g);

            sortedProducts.forEach(p => {
                const isBest = p.costPer100g === minCost && products.length > 1;
                const row = document.createElement('tr');
                row.className = `border-b border-slate-50 transition-colors ${isBest ? 'bg-amber-50/50' : 'hover:bg-slate-50/50'}`;
                
                row.innerHTML = `
                    <td class="px-4 py-4">
                        <div class="font-bold text-slate-800 text-sm uppercase">${p.name}</div>
                        <div class="text-[10px] text-slate-400 font-medium">₹${p.price} / ${p.weight}g</div>
                    </td>
                    <td class="px-4 py-4">
                        <div class="text-sm font-bold ${p.purity >= 75 ? 'text-emerald-600' : 'text-slate-600'}">${p.purity.toFixed(1)}%</div>
                        <div class="w-16 bg-slate-100 h-1 rounded-full overflow-hidden mt-1">
                            <div class="bg-indigo-500 h-full" style="width: ${p.purity}%"></div>
                        </div>
                    </td>
                    <td class="px-4 py-4">
                        <div class="text-sm font-bold text-slate-700">₹${p.costPerScoop.toFixed(2)}</div>
                        <div class="text-[10px] text-slate-400 font-medium">Per ${p.scoop}g Scoop</div>
                    </td>
                    <td class="px-4 py-4">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-black text-slate-800">₹${p.costPer100g.toFixed(2)}</span>
                            ${isBest ? '<span class="text-[8px] bg-amber-400 text-white font-black px-1 rounded">BEST</span>' : ''}
                        </div>
                        <div class="text-[10px] text-slate-400 font-medium tracking-tight">Per 100g Protein</div>
                    </td>
                    <td class="px-4 py-4 text-center">
                        <button onclick="removeProduct(${p.id})" class="text-slate-300 hover:text-rose-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        function removeProduct(id) {
            products = products.filter(p => p.id !== id);
            saveAndRender();
        }

        function resetForm() {
            ['pName', 'pPrice', 'pWeight', 'pScoop', 'pProt'].forEach(id => {
                document.getElementById(id).value = '';
            });
        }

        function clearStorage() {
            if (confirm("Delete all saved protein comparison data?")) {
                products = [];
                localStorage.removeItem('whey_comparison');
                renderTable();
            }
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-sm font-bold shadow-2xl transition-all duration-300 z-50 ${isError ? 'bg-rose-600 text-white' : 'bg-slate-800 text-white'}`;
            toast.style.opacity = '1';
            
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }
    </script>
</body>
</html>

```
